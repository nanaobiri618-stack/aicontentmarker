services:
  - type: web
    name: ai-content-marker
    runtime: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-content-marker-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://ai-content-marker.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false

databases:
  - name: ai-content-marker-db
    databaseName: ai_content_marker
    user: ai_content_marker
    plan: free
